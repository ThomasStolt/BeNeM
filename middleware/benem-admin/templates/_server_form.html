<div class="card server-card" id="server-{{ s.id or 'new' }}">
  <h2>{{ 'New Server' if is_new else 'Edit: ' + s.name }}</h2>
  <form hx-post="/admin/settings/servers/{{ 'add' if is_new else 'edit' }}"
        hx-target="closest .server-card"
        hx-swap="outerHTML">
    {% if not is_new %}
    <input type="hidden" name="original_id" value="{{ s.id }}">
    {% endif %}
    <div class="form-group">
      <label>Server ID</label>
      <input type="text" name="id" value="{{ s.id }}" placeholder="e.g. prod"
             class="mono" required>
    </div>
    <div class="form-group">
      <label>Display Name</label>
      <input type="text" name="name" value="{{ s.name }}" placeholder="e.g. Production" required>
    </div>
    <div class="form-group">
      <label>BHNM URL</label>
      <input type="text" name="url" value="{{ s.url }}" placeholder="https://bhnm.example.com"
             class="mono" required>
    </div>
    <div class="form-group">
      <label>API Key</label>
      <input type="password" name="api_key" value="{{ s.api_key }}" placeholder="API key" required>
    </div>
    <div class="form-group">
      <label>PIN <span style="color:var(--text-dim);font-weight:400;">(SaaS only, leave empty for on-prem)</span></label>
      <input type="text" name="pin" value="{{ s.pin }}" placeholder="(empty)" class="mono">
    </div>
    <div class="form-group" style="display:flex;align-items:center;gap:10px;">
      <label style="margin:0;">Incident Cache</label>
      <label class="switch">
        <input type="checkbox" name="cache_enabled" value="1"
               {% if s.cache_enabled %}checked{% endif %}
               onchange="document.getElementById('cache-interval-{{ s.id or 'new' }}').style.display = this.checked ? 'flex' : 'none'">
        <span class="slider"></span>
      </label>
    </div>
    <div class="form-group" id="cache-interval-{{ s.id or 'new' }}"
         style="display:{{ 'flex' if s.cache_enabled else 'none' }};align-items:center;gap:10px;">
      <label style="margin:0;">Refresh interval</label>
      <input type="number" name="cache_refresh_seconds" value="{{ s.cache_refresh_seconds }}"
             min="60" max="900" step="10" style="width:80px;" class="mono">
      <span style="color:var(--text-dim);font-size:12px;">seconds (60–900)</span>
    </div>
    <div style="display:flex;gap:8px;">
      <button type="submit" class="btn btn-primary btn-sm">Save</button>
      {% if is_new %}
      <button type="button" class="btn btn-ghost btn-sm"
              onclick="this.closest('.server-card').remove()">Cancel</button>
      {% else %}
      <button type="button" class="btn btn-ghost btn-sm"
              hx-get="/admin/settings/servers/card?server_id={{ s.id }}"
              hx-target="closest .server-card"
              hx-swap="outerHTML">Cancel</button>
      {% endif %}
    </div>
  </form>
</div>
