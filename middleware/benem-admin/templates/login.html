<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BeNeM Admin — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=IBM+Plex+Sans:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #0c0c14;
      --surface:     #131320;
      --surface-hi:  #1c1c2e;
      --border:      #2a2a40;
      --text:        #dde1f0;
      --text-muted:  #6b7190;
      --text-dim:    #44445a;
      --accent:      #4f8ef7;
      --accent-glow: rgba(79,142,247,0.18);
      --green:       #22d98a;
      --red:         #ff4d6a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Radial bloom behind card */
    body::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(79,142,247,0.07) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 40px 36px;
      width: 100%;
      max-width: 360px;
      position: relative;
      z-index: 1;
    }

    .login-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .brand-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green), 0 0 16px rgba(34,217,138,0.3);
      flex-shrink: 0;
      animation: dot-pulse 2.5s ease-in-out infinite;
    }

    @keyframes dot-pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--green), 0 0 16px rgba(34,217,138,0.3); }
      50%       { opacity: 0.55; box-shadow: 0 0 4px var(--green); }
    }

    .login-title {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .login-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 28px;
    }

    .error-box {
      background: rgba(255,77,106,0.08);
      border: 1px solid rgba(255,77,106,0.25);
      color: var(--red);
      border-radius: 7px;
      padding: 10px 14px;
      font-size: 12px;
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 8px;
      letter-spacing: 0.02em;
    }

    .otp-input {
      width: 100%;
      background: var(--surface-hi);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 28px;
      letter-spacing: 0.35em;
      color: var(--text);
      text-align: center;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      margin-bottom: 18px;
      appearance: none;
      -webkit-appearance: none;
    }

    .otp-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .btn-submit {
      width: 100%;
      padding: 10px 18px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 7px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 1px 8px rgba(79,142,247,0.25);
      transition: all 0.15s;
    }

    .btn-submit:hover {
      background: #6ba0ff;
      box-shadow: 0 2px 16px rgba(79,142,247,0.4);
      transform: translateY(-1px);
    }

    .btn-submit:active { transform: scale(0.98); box-shadow: none; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-brand">
      <div class="brand-dot"></div>
      <span class="login-title">BeNeM Admin</span>
    </div>
    <p class="login-subtitle">Enter your authenticator code to continue.</p>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="post" action="/admin/login">
      <label>6-digit code</label>
      <input class="otp-input" type="text" name="code"
             inputmode="numeric" pattern="[0-9]{6}"
             maxlength="6" autocomplete="one-time-code" autofocus>
      <button type="submit" class="btn-submit">Sign In</button>
    </form>
  </div>
</body>
</html>
