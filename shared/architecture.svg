<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 880" width="960" height="880"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#4A5568"/>
    </marker>
    <marker id="arr-purple" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#7C3AED"/>
    </marker>
    <marker id="arr-green" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#059669"/>
    </marker>
    <filter id="sh">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Page background -->
  <rect width="960" height="880" fill="#F0F4F8"/>

  <!-- Title -->
  <text x="480" y="32" text-anchor="middle" font-size="17" font-weight="700"
        fill="#1A202C" letter-spacing="0.5">BeNeM — System Architecture</text>

  <!-- ═══════════════════════════════════════════════
       iPhone box  (left client)
  ═══════════════════════════════════════════════ -->
  <rect x="30" y="50" width="400" height="210" rx="14"
        fill="white" stroke="#3B82F6" stroke-width="2" filter="url(#sh)"/>
  <rect x="30" y="50" width="400" height="38" rx="14" fill="#3B82F6"/>
  <rect x="30" y="70" width="400" height="18" fill="#3B82F6"/>
  <text x="230" y="75" text-anchor="middle" font-size="13.5" font-weight="700" fill="white">
    iPhone  ·  BeNeM iOS App  (Swift/SwiftUI)
  </text>

  <text x="48" y="106" font-size="10.5" font-weight="700" fill="#1A202C">Cached Incidents  (enriched with alarm counts)</text>
  <text x="48" y="120" font-size="9.5" fill="#4A5568">GET /api/v1/incidents  ·  HTTPS : 443</text>
  <text x="48" y="133" font-size="9.5" fill="#4A5568">X-Proxy-Token + X-BHNM-Target headers</text>

  <text x="48" y="152" font-size="10.5" font-weight="700" fill="#1A202C">API Proxy  (devices · ACK · tactical · performance)</text>
  <text x="48" y="166" font-size="9.5" fill="#4A5568">POST /fw/*  ·  POST /api/*  ·  HTTPS : 443</text>

  <text x="48" y="185" font-size="10.5" font-weight="700" fill="#1A202C">Push Registration</text>
  <text x="48" y="199" font-size="9.5" fill="#4A5568">POST /register  ·  X-Webhook-Token  ·  JSON { token, device_name }</text>

  <text x="48" y="220" font-size="9" fill="#9CA3AF">
    Config: benem://configure?p=... (AES-256-GCM deep link / QR code)
  </text>
  <text x="48" y="233" font-size="9" fill="#9CA3AF">
    Push: APNs (Time Sensitive entitlement)  ·  Sandbox + Production
  </text>

  <!-- ═══════════════════════════════════════════════
       Android/PWA box  (right client)
  ═══════════════════════════════════════════════ -->
  <rect x="530" y="50" width="400" height="210" rx="14"
        fill="white" stroke="#059669" stroke-width="2" filter="url(#sh)"/>
  <rect x="530" y="50" width="400" height="38" rx="14" fill="#059669"/>
  <rect x="530" y="70" width="400" height="18" fill="#059669"/>
  <text x="730" y="75" text-anchor="middle" font-size="13.5" font-weight="700" fill="white">
    Android / Desktop  ·  BeNeM PWA  (React/TS)
  </text>

  <text x="548" y="106" font-size="10.5" font-weight="700" fill="#1A202C">Cached Incidents  (enriched with alarm counts)</text>
  <text x="548" y="120" font-size="9.5" fill="#4A5568">GET /bhnm/api/v1/incidents  ·  HTTPS : 443</text>
  <text x="548" y="133" font-size="9.5" fill="#4A5568">X-Proxy-Token + X-BHNM-Target headers</text>

  <text x="548" y="152" font-size="10.5" font-weight="700" fill="#1A202C">API Proxy  (devices · ACK · tactical · performance)</text>
  <text x="548" y="166" font-size="9.5" fill="#4A5568">POST /bhnm/fw/*  ·  POST /bhnm/api/*  ·  HTTPS : 443</text>

  <text x="548" y="185" font-size="10.5" font-weight="700" fill="#1A202C">Push Registration</text>
  <text x="548" y="199" font-size="9.5" fill="#4A5568">POST /bhnm/register-webpush  ·  X-Webhook-Token  ·  VAPID</text>

  <text x="548" y="220" font-size="9" fill="#9CA3AF">
    Config: QR code scan (AES-256-GCM encrypted payload)
  </text>
  <text x="548" y="233" font-size="9" fill="#9CA3AF">
    Push: Web Push (VAPID)  ·  Served at pwa.hurrikap.org : 443
  </text>

  <!-- ═══════════════════════════════════════════════
       Arrows: Clients → Middleware
  ═══════════════════════════════════════════════ -->
  <!-- iPhone down -->
  <line x1="230" y1="260" x2="350" y2="310"
        stroke="#4A5568" stroke-width="2" marker-end="url(#arr)"/>
  <!-- PWA down -->
  <line x1="730" y1="260" x2="610" y2="310"
        stroke="#4A5568" stroke-width="2" marker-end="url(#arr)"/>

  <!-- label pill: iPhone -->
  <rect x="210" y="272" width="120" height="18" rx="5" fill="#DBEAFE"/>
  <text x="270" y="285" text-anchor="middle" font-size="9.5" fill="#1D4ED8" font-weight="600">
    HTTPS : 443
  </text>
  <!-- label pill: PWA -->
  <rect x="630" y="272" width="120" height="18" rx="5" fill="#D1FAE5"/>
  <text x="690" y="285" text-anchor="middle" font-size="9.5" fill="#047857" font-weight="600">
    HTTPS : 443
  </text>

  <!-- ═══════════════════════════════════════════════
       Middleware box  (y 315 – 555)
  ═══════════════════════════════════════════════ -->
  <rect x="100" y="315" width="760" height="245" rx="14"
        fill="white" stroke="#F59E0B" stroke-width="2" filter="url(#sh)"/>
  <rect x="100" y="315" width="760" height="42" rx="14" fill="#F59E0B"/>
  <rect x="100" y="339" width="760" height="18" fill="#F59E0B"/>
  <text x="480" y="340" text-anchor="middle" font-size="13.5" font-weight="700" fill="white">
    Middleware  ·  bhnm-apns.hurrikap.org
  </text>
  <text x="480" y="354" text-anchor="middle" font-size="10" fill="white">
    Caddy : 443 (TLS)  &#8594;  FastAPI/uvicorn : 8889  ·  Admin Portal : 8001  ·  PWA Nginx : 80
  </text>

  <!-- Left column: Endpoints -->
  <text x="118" y="380" font-size="10.5" font-weight="700" fill="#1A202C">Endpoints (FastAPI : 8889)</text>
  <text x="118" y="395" font-size="9.5" fill="#4A5568">GET/POST  /api/v1/incidents        &#8592;  Cached enriched incidents</text>
  <text x="118" y="409" font-size="9.5" fill="#4A5568">POST  /register                    &#8592;  APNs token (iOS)</text>
  <text x="118" y="423" font-size="9.5" fill="#4A5568">POST  /register-webpush            &#8592;  Web Push subscription (PWA)</text>
  <text x="118" y="437" font-size="9.5" fill="#4A5568">POST  /webhook?secret=...          &#8592;  BHNM incident webhook</text>
  <text x="118" y="451" font-size="9.5" fill="#4A5568">POST  /api/proxy/incident/ack|unack &#8592;  ACK proxy</text>
  <text x="118" y="465" font-size="9.5" fill="#4A5568">/{path}                            &#8592;  Catch-all BHNM API proxy</text>
  <text x="118" y="479" font-size="9.5" fill="#4A5568">POST  /internal/cache/reload       &#8592;  Admin &#8594; cache trigger</text>

  <!-- Right column: Incident Cache -->
  <text x="540" y="380" font-size="10.5" font-weight="700" fill="#1A202C">Incident Cache (in-memory)</text>
  <text x="540" y="395" font-size="9.5" fill="#4A5568">Background asyncio.Task per server</text>
  <text x="540" y="409" font-size="9.5" fill="#4A5568">Fetches getincidents + getincidentdetail</text>
  <text x="540" y="423" font-size="9.5" fill="#4A5568">Paced: 1 API call per N seconds</text>
  <text x="540" y="437" font-size="9.5" fill="#4A5568">Configurable refresh (60-900s, default 120s)</text>
  <text x="540" y="451" font-size="9.5" fill="#4A5568">Enable/disable per server via Admin UI</text>

  <!-- Auth section -->
  <text x="540" y="474" font-size="10.5" font-weight="700" fill="#1A202C">Authentication</text>
  <text x="540" y="489" font-size="9.5" fill="#4A5568">X-Proxy-Token: apiKey or global PROXY_TOKEN</text>
  <text x="540" y="503" font-size="9.5" fill="#4A5568">X-BHNM-Target: BHNM server URL (routing)</text>
  <text x="540" y="517" font-size="9.5" fill="#4A5568">X-Webhook-Token: per-device push secret</text>

  <!-- Admin portal note -->
  <text x="118" y="500" font-size="10.5" font-weight="700" fill="#1A202C">Admin Portal (: 8001)</text>
  <text x="118" y="515" font-size="9.5" fill="#4A5568">Server management + cache toggle</text>
  <text x="118" y="529" font-size="9.5" fill="#4A5568">QR/link generation · push device list</text>
  <text x="118" y="543" font-size="9.5" fill="#4A5568">TOTP auth · HTMX UI · audit log</text>

  <!-- ═══════════════════════════════════════════════
       Arrows: Middleware ↔ BHNM
  ═══════════════════════════════════════════════ -->
  <line x1="250" y1="560" x2="170" y2="610"
        stroke="#4A5568" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="210" y1="610" x2="300" y2="560"
        stroke="#4A5568" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="165" y="582" font-size="9" fill="#374151" font-weight="600">HTTPS proxy</text>
  <text x="165" y="594" font-size="9" fill="#374151" font-weight="600">+ cache fetch</text>
  <text x="270" y="594" font-size="9" fill="#374151" font-weight="600">webhook</text>

  <!-- ═══════════════════════════════════════════════
       Arrow: Middleware → APNs
  ═══════════════════════════════════════════════ -->
  <line x1="620" y1="560" x2="690" y2="610"
        stroke="#8B5CF6" stroke-width="2" marker-end="url(#arr-purple)"/>
  <text x="610" y="580" font-size="9" fill="#374151" font-weight="600">HTTPS : 443</text>
  <text x="610" y="592" font-size="9" fill="#374151" font-weight="600">HTTP/2 (APNs)</text>

  <!-- ═══════════════════════════════════════════════
       Arrow: Middleware → Web Push
  ═══════════════════════════════════════════════ -->
  <line x1="750" y1="560" x2="820" y2="610"
        stroke="#059669" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="755" y="580" font-size="9" fill="#374151" font-weight="600">HTTPS : 443</text>
  <text x="755" y="592" font-size="9" fill="#374151" font-weight="600">VAPID (Web Push)</text>

  <!-- ═══════════════════════════════════════════════
       BHNM Server box
  ═══════════════════════════════════════════════ -->
  <rect x="20" y="618" width="310" height="140" rx="14"
        fill="white" stroke="#10B981" stroke-width="2" filter="url(#sh)"/>
  <rect x="20" y="618" width="310" height="35" rx="14" fill="#10B981"/>
  <rect x="20" y="636" width="310" height="17" fill="#10B981"/>
  <text x="175" y="641" text-anchor="middle" font-size="12.5" font-weight="700" fill="white">
    BHNM Server  (self-hosted)
  </text>

  <text x="38" y="672" font-size="10" font-weight="700" fill="#1A202C">API Endpoints</text>
  <text x="38" y="686" font-size="9.5" fill="#4A5568">POST /api/incident_api.php  (incidents, incident detail)</text>
  <text x="38" y="700" font-size="9.5" fill="#4A5568">POST /fw/index.php?r=restful/...  (devices, tactical, perf)</text>
  <text x="38" y="714" font-size="9.5" fill="#4A5568">Auth: password=apiKey + pin (optional)</text>
  <text x="38" y="728" font-size="9" fill="#9CA3AF">Port: per deployment (typically 443 or 8888)</text>
  <text x="38" y="741" font-size="9" fill="#9CA3AF">Fires POST /webhook on incident state change</text>

  <!-- ═══════════════════════════════════════════════
       Apple APNs box
  ═══════════════════════════════════════════════ -->
  <rect x="540" y="618" width="195" height="140" rx="14"
        fill="white" stroke="#8B5CF6" stroke-width="2" filter="url(#sh)"/>
  <rect x="540" y="618" width="195" height="35" rx="14" fill="#8B5CF6"/>
  <rect x="540" y="636" width="195" height="17" fill="#8B5CF6"/>
  <text x="637" y="641" text-anchor="middle" font-size="12.5" font-weight="700" fill="white">
    Apple APNs
  </text>

  <text x="558" y="672" font-size="10" font-weight="700" fill="#1A202C">Push Delivery (iOS)</text>
  <text x="558" y="686" font-size="9.5" fill="#4A5568">api.push.apple.com : 443</text>
  <text x="558" y="700" font-size="9.5" fill="#4A5568">HTTP/2 ·  ES256 JWT auth</text>
  <text x="558" y="714" font-size="9.5" fill="#4A5568">Sandbox + Production</text>
  <text x="558" y="728" font-size="9" fill="#9CA3AF">Payload: { aps, incident_id }</text>

  <!-- ═══════════════════════════════════════════════
       Web Push Providers box
  ═══════════════════════════════════════════════ -->
  <rect x="755" y="618" width="185" height="140" rx="14"
        fill="white" stroke="#059669" stroke-width="2" filter="url(#sh)"/>
  <rect x="755" y="618" width="185" height="35" rx="14" fill="#059669"/>
  <rect x="755" y="636" width="185" height="17" fill="#059669"/>
  <text x="847" y="641" text-anchor="middle" font-size="12.5" font-weight="700" fill="white">
    Web Push
  </text>

  <text x="773" y="672" font-size="10" font-weight="700" fill="#1A202C">Push Delivery (Android)</text>
  <text x="773" y="686" font-size="9.5" fill="#4A5568">FCM / browser endpoints</text>
  <text x="773" y="700" font-size="9.5" fill="#4A5568">HTTPS : 443  ·  VAPID auth</text>
  <text x="773" y="714" font-size="9.5" fill="#4A5568">pywebpush library</text>
  <text x="773" y="728" font-size="9" fill="#9CA3AF">Payload: { title, body, incident_id }</text>

  <!-- ═══════════════════════════════════════════════
       Push delivery arcs back to clients
  ═══════════════════════════════════════════════ -->
  <!-- APNs → iPhone (purple arc, left) -->
  <path d="M 540,680 C 470,500 200,350 130,260"
        stroke="#8B5CF6" stroke-width="1.8" fill="none"
        stroke-dasharray="6,3" marker-end="url(#arr-purple)"/>
  <rect x="10" y="440" width="68" height="34" rx="5" fill="#EDE9FE"/>
  <text x="44" y="454" text-anchor="middle" font-size="9.5" fill="#6D28D9" font-weight="600">push</text>
  <text x="44" y="467" text-anchor="middle" font-size="9.5" fill="#6D28D9" font-weight="600">notification</text>

  <!-- Web Push → PWA (green arc, right) -->
  <path d="M 940,680 C 960,480 860,320 830,260"
        stroke="#059669" stroke-width="1.8" fill="none"
        stroke-dasharray="6,3" marker-end="url(#arr-green)"/>
  <rect x="910" y="440" width="48" height="34" rx="5" fill="#D1FAE5"/>
  <text x="934" y="454" text-anchor="middle" font-size="9.5" fill="#047857" font-weight="600">web</text>
  <text x="934" y="467" text-anchor="middle" font-size="9.5" fill="#047857" font-weight="600">push</text>

  <!-- ═══════════════════════════════════════════════
       Legend
  ═══════════════════════════════════════════════ -->
  <line x1="20" y1="790" x2="940" y2="790" stroke="#CBD5E0" stroke-width="1"/>
  <!-- solid arrow -->
  <line x1="30" y1="808" x2="54" y2="808" stroke="#4A5568" stroke-width="2" marker-end="url(#arr)"/>
  <text x="61" y="812" font-size="9" fill="#4A5568">HTTPS request</text>
  <!-- dashed arrow -->
  <line x1="170" y1="808" x2="194" y2="808" stroke="#4A5568" stroke-width="1.5"
        stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="201" y="812" font-size="9" fill="#4A5568">Webhook (async)</text>
  <!-- purple dashed -->
  <line x1="320" y1="808" x2="344" y2="808" stroke="#8B5CF6" stroke-width="1.5"
        stroke-dasharray="4,3" marker-end="url(#arr-purple)"/>
  <text x="351" y="812" font-size="9" fill="#4A5568">APNs push (iOS)</text>
  <!-- green dashed -->
  <line x1="460" y1="808" x2="484" y2="808" stroke="#059669" stroke-width="1.5"
        stroke-dasharray="4,3" marker-end="url(#arr-green)"/>
  <text x="491" y="812" font-size="9" fill="#4A5568">Web Push (Android)</text>

  <!-- Docker note -->
  <text x="30" y="840" font-size="9.5" fill="#6B7280" font-weight="600">Docker Compose Services:</text>
  <text x="30" y="855" font-size="9" fill="#9CA3AF">
    benem-middleware (FastAPI :8889)  ·  benem-admin (FastAPI :8001)  ·  benem-pwa (Nginx :80)  ·  caddy (TLS :443/:80)
  </text>
  <text x="30" y="868" font-size="9" fill="#9CA3AF">
    Volumes: db-data (SQLite)  ·  servers.json (shared config)  ·  caddy-data (TLS certs)  ·  benem-admin-log (audit)
  </text>
</svg>
