server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (Caddy adds HSTS at the TLS layer; nginx runs behind it)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Long-cache for hashed assets (Vite rewrites filenames on every build)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # No-cache for the app shell, service worker, and manifest so Workbox
    # can pick up new builds on the next visit.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
